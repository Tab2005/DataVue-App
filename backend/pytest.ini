[pytest]
# pytest 設定檔案
# 安裝：pip install -r requirements-dev.txt
# 執行：pytest tests/ -v
# 覆蓋率：pytest tests/ -v --cov=. --cov-report=html --cov-omit="tests/*,alembic/*,scripts/*"

testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 顯示詳細失敗訊息
addopts = -v --tb=short -p no:warnings

# asyncio 模式（供 pytest-asyncio 使用）
asyncio_mode = auto

# 測試超時（秒）
# timeout = 30
